 <!DOCTYPE html>                                                                                        <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrack - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
  </head>
  <body class="auth-body">

      <div class="auth-container">

          <!-- Logo -->
          <div class="auth-logo">
              <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24   24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"                         stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7         7Z"/><path d="m8.5 8.5 7 7"/></svg></span>
              <span class="logo-text">MedTrack</span>
          </div>

          <!-- Card -->
          <div class="auth-card">
              <h1 class="auth-title">Welcome back</h1>
              <p class="auth-subtitle">Log in to your account</p>

              <form id="login-form" class="auth-form">
                  <div class="form-group">
                      <label class="form-label">Email</label>
                      <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
                  </div>
                  <div class="form-group">
                      <label class="form-label">Password</label>
                      <input type="password" id="login-password" class="form-input" placeholder="" required>
                  </div>
                  <p id="login-error" class="auth-error hidden">Invalid email or password.</p>
                  <button type="submit" class="btn-auth">Log In</button>
              </form>

              <p class="auth-switch">Don't have an account? <a href="register.html" class="auth-link">Register here</a></p>
          </div>

      </div>

      <script src="js/auth.js"></script>
  </body>
  </html>
