<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrack</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ========== MOBILE LAYOUT (Patient View) ========== -->
    <div id="mobile-layout">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <div class="logo">
                <span class="logo-icon">💊</span>
                <span class="logo-text">MedTrack</span>
            </div>
            <div class="header-right">
                <select id="role-selector" class="role-dropdown">
                    <option value="patient">Patient</option>
                    <option value="doctor">Doctor</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="profile-btn">👤</button>
            </div>
        </header>

        <!-- Mobile Content -->
        <main id="mobile-content" class="mobile-main">
            <!-- Dynamic content loads here -->
        </main>

        <!-- Bottom Navigation (Mobile Only) -->
        <nav id="bottom-nav" class="bottom-nav">
        <button class="nav-item active" data-page="dashboard">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-item" data-page="medications">
                <span class="nav-icon">💊</span>
                <span class="nav-label">Meds</span>
            </button>
            <button class="nav-item" data-page="history">
                <span class="nav-icon">📋</span>
                <span class="nav-label">History</span>
            </button>
            <button class="nav-item" data-page="reminders">
                <span class="nav-icon">⏰</span>
                <span class="nav-label">Reminders</span>
            </button>
            <button class="nav-item" data-page="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </button>
        </nav>
    </div>

    <!-- ========== DESKTOP LAYOUT (Doctor/Admin View) ========== -->
    <div id="desktop-layout" class="desktop-layout" style="display: none;">
        <!-- Desktop Header -->
        <header class="desktop-header">
            <div class="logo">
                <span class="logo-icon">💊</span>
                <span class="logo-text">MedTrack</span>
            </div>
            <div class="header-right">
                <select id="role-selector-desktop" class="role-dropdown">
                    <option value="patient">Patient</option>
                    <option value="doctor">Doctor</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="profile-btn">👤</button>
            </div>
        </header>

        <!-- Desktop Sidebar -->
        <aside id="sidebar" class="sidebar">
            <!-- Navigation items will be loaded by JS based on role -->
        </aside>

        <!-- Desktop Content -->
        <main id="desktop-content" class="desktop-main">
            <!-- Dynamic content loads here -->
        </main>
    </div>

    <!-- JavaScript Files -->
    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
