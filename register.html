  <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>MedTrack - Register</title>
      <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="auth-body">

      <div class="auth-container">

          <!-- Logo -->
          <div class="auth-logo">
              <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24   24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"                         stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7         7Z"/><path d="m8.5 8.5 7 7"/></svg></span>
              <span class="logo-text">MedTrack</span>
          </div>

          <!-- Card -->
          <div class="auth-card">
              <h1 class="auth-title">Create an account</h1>
              <p class="auth-subtitle">Start tracking your medications today</p>

              <form id="register-form" class="auth-form">
                  <div class="form-group">
                      <label class="form-label">First Name</label>
                      <input type="text" id="reg-name" class="form-input" placeholder="John" required>
                  </div>
                  <div class="form-group">
                      <label class="form-label">Last Name</label>
                      <input type="text" id="reg-surname" class="form-input" placeholder="Smith" required>
                  </div>
                  <div class="form-group">
                      <label class="form-label">Email</label>
                      <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required>
                  </div>
                  <div class="form-group">
                      <label class="form-label">Password</label>
                      <input type="password" id="reg-password" class="form-input" placeholder="Min. 6 characters" required>
                  </div>
                  <div class="form-group">
                      <label class="form-label">Confirm Password</label>
                      <input type="password" id="reg-confirm" class="form-input" placeholder="Repeat password" required>
                  </div>
                  <div class="form-group">
                      <label class="form-label">Role</label>
                      <select id="reg-role" class="form-input">
                          <option value="patient">Patient</option>
                          <option value="doctor">Doctor</option>
                      </select>
                  </div>
                  <p id="reg-error" class="auth-error hidden"></p>
                  <button type="submit" class="btn-auth">Create Account</button>
              </form>

              <p class="auth-switch">Already have an account? <a href="login.html" class="auth-link">Log in here</a></p>
          </div>

      </div>

      <script src="js/auth.js"></script>
  </body>
  </html>
